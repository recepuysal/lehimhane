<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="Arduino Uno DS18B20 balant1">
  <rect width="900" height="560" fill="#f3f6f4"/>
  <text x="450" y="36" text-anchor="middle" fill="#14241c" font-family="Georgia, serif" font-size="24" font-weight="700">Arduino Uno ◊ DS18B20</text>
  <!-- Uno board -->
  <rect x="40" y="80" width="320" height="420" rx="12" fill="#00979d" stroke="#0b6e4f" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Arduino Uno</text>
  <rect x="60" y="140" width="120" height="80" rx="6" fill="#1a1a1a"/>
  <!-- digital pins label -->
  <text x="300" y="160" fill="#e8f5ef" font-family="system-ui,sans-serif" font-size="12">D2</text>
  <circle cx="300" cy="180" r="8" fill="#f4c95f"/>
  <text x="70" y="280" fill="#e8f5ef" font-family="system-ui,sans-serif" font-size="12">5V</text>
  <circle cx="90" cy="300" r="8" fill="#e74c3c"/>
  <text x="70" y="340" fill="#e8f5ef" font-family="system-ui,sans-serif" font-size="12">GND</text>
  <circle cx="90" cy="360" r="8" fill="#2c3e50"/>
  <!-- wires -->
  <path d="M300 180 C420 180, 420 220, 560 220" fill="none" stroke="#f4c95f" stroke-width="4"/>
  <path d="M90 300 C250 300, 400 260, 560 260" fill="none" stroke="#e74c3c" stroke-width="4"/>
  <path d="M90 360 C250 360, 400 300, 560 300" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <!-- pull-up -->
  <rect x="430" y="150" width="70" height="28" rx="4" fill="#fff" stroke="#0b6e4f" stroke-width="2"/>
  <text x="465" y="169" text-anchor="middle" fill="#0b6e4f" font-family="system-ui,sans-serif" font-size="12" font-weight="700">4.7k©</text>
  <path d="M465 178 V220" fill="none" stroke="#0b6e4f" stroke-width="2"/>
  <path d="M465 150 V130 H560 V220" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- sensor -->
  <ellipse cx="620" cy="260" rx="50" ry="70" fill="#2a2a2a" stroke="#7ec8a3" stroke-width="2"/>
  <text x="620" y="255" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">DS18B20</text>
  <line x1="595" y1="330" x2="560" y2="300" stroke="#2c3e50" stroke-width="3"/>
  <line x1="620" y1="330" x2="560" y2="220" stroke="#f4c95f" stroke-width="3"/>
  <line x1="645" y1="330" x2="560" y2="260" stroke="#e74c3c" stroke-width="3"/>
  <text x="700" y="220" fill="#14241c" font-family="system-ui,sans-serif" font-size="14">DQ í D2</text>
  <text x="700" y="260" fill="#14241c" font-family="system-ui,sans-serif" font-size="14">VDD í 5V</text>
  <text x="700" y="300" fill="#14241c" font-family="system-ui,sans-serif" font-size="14">GND í GND</text>
  <text x="450" y="520" text-anchor="middle" fill="#3a4a42" font-family="system-ui,sans-serif" font-size="14">DQ ile 5V aras1nda 4.7k© pull-up (zorunlu)</text>
</svg>
