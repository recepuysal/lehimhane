[build]
builder = "NIXPACKS"
# Install aşaması zaten `npm ci` çalıştırıyor; burada tekrar çalıştırmak
# node_modules/.cache mount'unda EBUSY veriyor.
buildCommand = "npx prisma generate && npm run build"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
